services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Overrides the sqlite default from .env — inside compose, "db" is the
      # postgres service hostname, not localhost.
      DATABASE_URL: postgresql://hr_user:${POSTGRES_PASSWORD}@db:5432/hr_agent
    volumes:
      - ./browser_data:/app/browser_data
      - ./resume:/app/resume
      - ./output:/app/output
    depends_on:
      db:
        condition: service_healthy
    # Playwright's persistent-context login needs a real X server the first
    # time each user scans a QR code. --ipc=host avoids Chromium crashing from
    # low shared memory in containers (common Playwright-in-Docker gotcha).
    ipc: host

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hr_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: hr_agent
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hr_user"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
